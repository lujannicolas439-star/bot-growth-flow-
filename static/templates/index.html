<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>AsyncLatAm Flow</title>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-lg border border-gray-100">
        <img src="{{ url_for('static', filename='foto.jpeg') }}" 
             class="w-full h-48 object-cover rounded-2xl mb-6 shadow-inner">

        <h1 class="text-3xl font-extrabold text-blue-900 mb-2">¡Súmate al Flow!</h1>
        <p class="text-gray-500 mb-6">Completa los datos para registrar el talento.</p>
        
        <form action="/guardar" method="POST" class="space-y-4">
            <input type="text" name="cliente" placeholder="Nombre del Cliente" required 
                   class="w-full p-4 rounded-xl border border-gray-200 focus:ring-2 focus:ring-teal-500 outline-none">
            <input type="text" name="producto" placeholder="Producto" required 
                   class="w-full p-4 rounded-xl border border-gray-200 focus:ring-2 focus:ring-teal-500 outline-none">
            <input type="number" name="monto" placeholder="Monto ($)" required 
                   class="w-full p-4 rounded-xl border border-gray-200 focus:ring-2 focus:ring-teal-500 outline-none">
            
            <button type="submit" class="w-full bg-blue-900 hover:bg-blue-950 text-white font-bold py-4 rounded-xl transition">
                Enviar al Bot
            </button>
        </form>
    </div>

</body>
</html>
