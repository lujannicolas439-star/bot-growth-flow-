<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsyncLatAm Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #1e3a8a 0%, #0d9488 100%);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <main class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-8 md:p-12 rounded-3xl shadow-2xl w-full max-w-md border border-gray-100">
            
            <div class="mb-8 text-center">
                <img src="{{ url_for('static', filename='foto.jpeg') }}" 
                     alt="AsyncLatAm" 
                     class="w-32 h-32 mx-auto rounded-full object-cover border-4 border-teal-500 shadow-lg">
            </div>

            <h1 class="text-3xl font-extrabold text-blue-900 mb-2 text-center">¡Súmate al Flow!</h1>
            <p class="text-gray-500 mb-8 text-center">Completa los datos y empecemos a escalar.</p>
            
            <form action="/guardar" method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Nombre del Cliente</label>
                    <input type="text" name="cliente" required 
                           class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:ring-2 focus:ring-teal-500 outline-none transition">
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Producto / Servicio</label>
                    <input type="text" name="producto" required 
                           class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:ring-2 focus:ring-teal-500 outline-none transition">
                </div>
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Monto ($)</label>
                    <input type="number" name="monto" required 
                           class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200 focus:ring-2 focus:ring-teal-500 outline-none transition">
                </div>
                
                <button type="submit" 
                        class="w-full gradient-bg hover:opacity-90 text-white font-bold py-4 rounded-xl shadow-lg transition transform hover:scale-[1.02]">
                    Enviar al Bot
                </button>
            </form>
        </div>
    </main>

</body>
</html>
