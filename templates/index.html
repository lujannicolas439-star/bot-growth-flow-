<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsyncLatAm Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-6">
    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md border border-gray-100">
        <div class="mb-8 text-center">
            <img src="{{ url_for('static', filename='foto.jpeg') }}" 
                 alt="Foto"
                 class="w-32 h-32 mx-auto rounded-full object-cover border-4 border-teal-500">
        </div>
        <h1 class="text-3xl font-bold text-blue-900 mb-6 text-center">¡Súmate al Flow!</h1>
        <form action="/guardar" method="POST" class="space-y-4">
            <input type="text" name="cliente" placeholder="Nombre del Cliente" required 
                   class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200">
            <input type="text" name="producto" placeholder="Producto / Servicio" required 
                   class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200">
            <input type="number" name="monto" placeholder="Monto ($)" required 
                   class="w-full px-4 py-3 rounded-xl bg-gray-50 border border-gray-200">
            <button type="submit" class="w-full bg-teal-600 text-white font-bold py-4 rounded-xl hover:bg-teal-700">
                Enviar al Bot
            </button>
        </form>
    </div>
</body>
</html>
