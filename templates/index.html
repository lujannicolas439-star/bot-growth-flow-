<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        body { background: #000; color: #d4af37; font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #0a0a0a; padding: 50px; border: 2px solid #d4af37; border-radius: 5px; text-align: center; width: 400px; box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); }
        h1 { color: #fff; text-transform: uppercase; letter-spacing: 2px; }
        .wolf-img { width: 150px; height: 150px; border-radius: 50%; border: 3px solid #d4af37; margin-bottom: 20px; object-fit: cover; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 3px; }
        button { width: 100%; padding: 20px; background: #d4af37; border: none; color: #000; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 16px; }
        button:hover { background: #f0c950; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=300" class="wolf-img"> <!-- Imagen con impacto visual -->
        <h1>El Mercado es Tuyo</h1>
        <form action="/guardar" method="POST">
            <input type="text" name="cliente" placeholder="¿A quién vamos a cerrar?" required>
            <input type="text" name="producto" placeholder="El valor que les venderemos" required>
            <input type="number" name="monto" placeholder="¿Cuánto van a soltar?" required>
            <button type="submit">CERRAR EL TRATO AHORA</button>
        </form>
    </div>
</body>
</html>
