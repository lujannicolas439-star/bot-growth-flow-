<!DOCTYPE html>
<html>
<head>
    <title>Formulario</title>
</head>
<body style="background-color: black; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

    <div style="background-color: #1a1a1a; padding: 40px; border: 2px solid #d4af37; border-radius: 10px; text-align: center; width: 300px;">
        <h1 style="color: #d4af37;">EL MERCADO ES TUYO</h1>
        <form action="/guardar" method="POST">
            <input type="text" name="cliente" placeholder="Empresa" style="width: 100%; margin: 10px 0; padding: 10px;"><br>
            <input type="number" name="monto" placeholder="Monto" style="width: 100%; margin: 10px 0; padding: 10px;"><br>
            <button type="submit" style="width: 100%; padding: 15px; background: #d4af37; border: none; cursor: pointer;">CERRAR EL TRATO</button>
        </form>
    </div>

</body>
</html>
